<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Kehadiran</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <style>
        body { background-color: #121212; color: white; font-family: 'Open Sans', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 1rem; }
        .scanner-card { width: 100%; max-width: 600px; padding: 2rem; background-color: rgba(30, 30, 40, 0.9); border-radius: 15px; box-shadow: 0 0 20px rgba(167, 243, 0, 0.2); }
        h2 { text-align: center; margin-bottom: 1.5rem; text-transform: uppercase; border-bottom: 3px solid #A7F300; padding-bottom: 10px; }
        #qr-reader { width: 100%; background: white; border-radius: 10px; overflow: hidden; margin-bottom: 1rem; }
        .btn-custom { background-color: #A7F300; color: #1a1a1a; font-weight: 600; border: none; border-radius: 25px; padding: 10px 20px; transition: 0.3s; }
        .btn-custom:hover { background-color: #8AD400; }
        .btn-secondary-custom { background-color: #495057; color: white; font-weight: 600; border: none; border-radius: 25px; padding: 10px 20px; }
    </style>
</head>
<body>

    <div class="scanner-card">
        <h2>Scanner Kehadiran</h2>
        <div id="qr-reader"></div>
        <div class="text-center mt-3 d-flex gap-2 justify-content-center flex-wrap">
            <button id="btn-switch-camera" class="btn btn-custom">
                <span class="material-icons align-middle" style="font-size: 1.2rem;">switch_camera</span> Ganti Kamera
            </button> 
            <button id="btn-back" class="btn btn-secondary-custom">
                Kembali ke Admin
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    
    <script>
        // ========================================================
        // GANTI DENGAN LINK WEB APP GOOGLE APPS SCRIPT ANDA
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbxxRy9KMfVGG2pM-oVKAqqd3aZBbyKRH0bsBnnuff9oi4MT5Jpy8Xzo1DR9Ka1znGcXfA/exec";
        // ========================================================

        let html5QrCode;
        let currentFacingMode = "environment";
        let isProcessing = false; // Mencegah scan ganda

        document.addEventListener('DOMContentLoaded', () => {
            startScanner();

            document.getElementById('btn-switch-camera').addEventListener('click', switchCamera);
            document.getElementById('btn-back').addEventListener('click', () => {
                window.location.href = GAS_API_URL; // Kembali ke dashboard admin GAS
            });
        });

        function startScanner() {
            html5QrCode = new Html5Qrcode("qr-reader");
            html5QrCode.start(
                { facingMode: currentFacingMode },
                { fps: 10, qrbox: { width: 250, height: 250 } },
                onScanSuccess
            ).catch(err => {
                Swal.fire({ icon: 'error', title: 'Kamera Error', text: 'Pastikan Anda memberikan izin akses kamera.' });
            });
        }

        function switchCamera() {
            if (html5QrCode && html5QrCode.isScanning) {
                html5QrCode.stop().then(() => {
                    currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
                    startScanner();
                });
            }
        }

        async function onScanSuccess(decodedText) {
            if (isProcessing) return;
            isProcessing = true;

            // Hentikan scanner sementara agar tidak scan berulang kali
            if (html5QrCode && html5QrCode.isScanning) {
                await html5QrCode.stop();
            }

            Swal.fire({
                title: 'Memproses...',
                text: 'Mencatat kehadiran...',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            try {
                // Memanggil API Google Apps Script menggunakan Fetch
                const response = await fetch(`${GAS_API_URL}?action=checkin&phone=${encodeURIComponent(decodedText)}`);
                const result = await response.json();

                const toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 3500, timerProgressBar: true });

                if (result.status === "SUCCESS") {
                    toast.fire({ icon: 'success', title: `Check-in: ${result.name}` });
                } else if (result.status === "INFO") {
                    toast.fire({ icon: 'info', title: `${result.name} sudah check-in!` });
                } else if (result.status === "GAGAL") {
                    toast.fire({ icon: 'error', title: `Gagal: ${result.message}` });
                } else {
                    toast.fire({ icon: 'error', title: `Error: ${result.message}` });
                }
            } catch (error) {
                Swal.fire({ icon: 'error', title: 'Koneksi Gagal', text: 'Tidak dapat terhubung ke server.' });
            } finally {
                // Nyalakan kembali scanner setelah jeda
                setTimeout(() => {
                    isProcessing = false;
                    startScanner();
                }, 2000);
            }
        }
    </script>
</body>
</html>
